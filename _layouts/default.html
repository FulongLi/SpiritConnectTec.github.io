<!DOCTYPE html>
<html lang="{% if page.lang == 'zh' %}zh-Hans{% else %}en{% endif %}">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="theme-color" content="#0f1b2d"/>
  <meta name="color-scheme" content="dark"/>
  <title>{% if page.title %}{{ page.title }} – {% endif %}{% if page.lang == 'zh' %}{{ site.title_zh | default: site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.lang == 'zh' %}{{ page.description | default: site.description_zh }}{% else %}{{ page.description | default: site.description }}{% endif %}"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}"/>
  <link rel="icon" type="image/svg+xml" href="{{ '/images/general/logo_svg.svg' | relative_url }}">
  <meta property="og:image" content="{{ '/images/general/logo_svg.svg' | relative_url }}">
  {% seo %}
</head>
<body>
  {% include nav-vars.html %}
  {% include navbar.html %}
  {{ content }}
  {% include footer.html %}
  {% include scripts.html %}
</body>
</html>
