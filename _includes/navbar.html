<header class="nav nav-dark">
  <div class="container nav-inner">
    <div class="nav-left">
      <div class="lang-switch" aria-label="Language">
        <a href="{{ switch_en_url | relative_url }}" class="{% unless is_zh %}lang-active{% endunless %}">EN</a>
        <span aria-hidden="true">|</span>
        <a href="{{ switch_zh_url | relative_url }}" class="{% if is_zh %}lang-active{% endif %}">中文</a>
      </div>
      <a class="brand" href="{{ i18n_prefix | append: '/' | relative_url }}">
        <img src="{{ '/images/general/logo_svg.svg' | relative_url }}" alt="{% if is_zh %}灵接科技{% else %}Spirit Connect Technology{% endif %}" style="height:40px; margin-right:10px; vertical-align:middle;">
        <span>{% if is_zh %}灵接科技{% else %}Spirit Connect Technology{% endif %}</span>
      </a>
    </div>
    <button class="hamburger" aria-label="{% if is_zh %}打开菜单{% else %}Open menu{% endif %}" aria-controls="mainmenu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav id="mainmenu" class="menu">
      {% if is_zh %}
      <a href="{{ '/zh/' | relative_url }}">首页</a>
      <div class="dropdown">
        <button class="drop-toggle" aria-expanded="false">产品 ▾</button>
        <div class="drop-menu">
          <a href="{{ '/zh/products/cabin-sc1/' | relative_url }}">Cabin SC1</a>
          <a href="{{ '/zh/products/consciousness-projector/' | relative_url }}">意识投影仪</a>
        </div>
      </div>
      <a href="{{ '/zh/another-world/' | relative_url }}">另一世界</a>
      <div class="dropdown">
        <button class="drop-toggle" aria-expanded="false">公司 ▾</button>
        <div class="drop-menu">
          <a href="{{ '/zh/company/about/' | relative_url }}">关于我们</a>
          <a href="{{ '/zh/company/team/' | relative_url }}">团队</a>
          <a href="{{ '/zh/company/faq/' | relative_url }}">常见问题</a>
          <a href="{{ '/zh/company/document/' | relative_url }}">文档与资料</a>
          <a href="{{ '/zh/company/news/' | relative_url }}">新闻</a>
        </div>
      </div>
      <a href="{{ '/zh/spicopedia/' | relative_url }}">灵接百科</a>
      <a href="{{ '/zh/contact/' | relative_url }}" class="cta">联系我们</a>
      {% else %}
      <a href="{{ '/' | relative_url }}">Home</a>
      <div class="dropdown">
        <button class="drop-toggle" aria-expanded="false">Products ▾</button>
        <div class="drop-menu">
          <a href="{{ '/products/cabin-sc1/' | relative_url }}">Cabin SC1</a>
          <a href="{{ '/products/consciousness-projector/' | relative_url }}">Consciousness Projector</a>
        </div>
      </div>
      <a href="{{ '/another-world/' | relative_url }}">Another World</a>
      <div class="dropdown">
        <button class="drop-toggle" aria-expanded="false">Company ▾</button>
        <div class="drop-menu">
          <a href="{{ '/company/about/' | relative_url }}">About Us</a>
          <a href="{{ '/company/team/' | relative_url }}">Team</a>
          <a href="{{ '/company/faq/' | relative_url }}">FAQ</a>
          <a href="{{ '/company/document/' | relative_url }}">Document</a>
          <a href="{{ '/company/news/' | relative_url }}">News</a>
        </div>
      </div>
      <a href="{{ '/spicopedia/' | relative_url }}">Spicopedia</a>
      <a href="{{ '/contact/' | relative_url }}" class="cta">Contact</a>
      {% endif %}
    </nav>
  </div>
</header>
